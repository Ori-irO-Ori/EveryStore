{% extends "base.html" %}
{% block title %}Processing Payment — {{ STORE_NAME }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-24 text-center">
  <div id="state-processing">
    <div class="flex justify-center mb-6">
      <svg class="w-12 h-12 animate-spin text-slate-300" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
    </div>
    <h1 class="text-xl font-semibold text-slate-800 mb-2">Completing your payment…</h1>
    <p class="text-slate-400 text-sm">Please wait, do not close this page.</p>
  </div>

  <div id="state-error" class="hidden">
    <div class="text-4xl mb-4">⚠️</div>
    <h1 class="text-xl font-semibold text-slate-800 mb-2">Something went wrong</h1>
    <p id="error-msg" class="text-slate-500 text-sm mb-6"></p>
    <a href="/cart/checkout/" class="btn-primary inline-block px-6 py-2.5 rounded-full text-sm font-semibold">
      Try again
    </a>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency={{ STORE_CURRENCY }}&intent=capture"></script>
<script>
(function () {
  const csrfToken = '{{ csrf_token }}';
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');   // PayPal order ID on redirect return

  if (!token) {
    // No token — shouldn't land here directly
    window.location.href = '/cart/checkout/';
    return;
  }

  // Capture the payment
  fetch('/payments/capture-order/', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': csrfToken,
    },
    body: JSON.stringify({ paypal_order_id: token }),
  })
  .then(r => r.json())
  .then(result => {
    if (result.success) {
      window.location.href = '/cart/success/?order=' + result.order_number;
    } else {
      document.getElementById('state-processing').classList.add('hidden');
      document.getElementById('state-error').classList.remove('hidden');
      document.getElementById('error-msg').textContent =
        result.error || 'Payment capture failed. Please contact support.';
    }
  })
  .catch(() => {
    document.getElementById('state-processing').classList.add('hidden');
    document.getElementById('state-error').classList.remove('hidden');
    document.getElementById('error-msg').textContent = 'Network error. Please try again.';
  });
})();
</script>
{% endblock %}
